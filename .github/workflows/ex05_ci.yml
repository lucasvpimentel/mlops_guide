name: CI - Exercicio 05 (Avaliacao de Carros)

on:
  push:
    paths:
      - 'exercicio_05/**'
      - '.github/workflows/ex05_ci.yml'
  pull_request:
    paths:
      - 'exercicio_05/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: exercicio_05

    env:
      PYTHONPATH: ${{ github.workspace }}/exercicio_05

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 app/ src/
