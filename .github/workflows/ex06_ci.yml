name: CI - Exercicio 06 (Curador de Moda)

on:
  push:
    paths:
      - 'exercicio_06/**'
      - '.github/workflows/ex06_ci.yml'
  pull_request:
    paths:
      - 'exercicio_06/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: exercicio_06

    env:
      PYTHONPATH: ${{ github.workspace }}/exercicio_06

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt --ignore-requires-python

      - name: Lint with flake8
        run: flake8 app/ train/ tests/

      - name: Run unit tests (sem modelo)
        run: pytest tests/test_schemas.py -v
