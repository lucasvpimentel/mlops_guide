name: CI - Exercicio 06
on:
  push:
    paths:
      - 'exercicio_06/**'
  pull_request:
    paths:
      - 'exercicio_06/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pandas scikit-learn joblib fastapi uvicorn tensorflow-cpu pillow python-multipart
          if [ -f exercicio_06/requirements.txt ]; then pip install -r exercicio_06/requirements.txt; fi

      - name: Lint with flake8
        run: flake8 exercicio_06/

      - name: Train model
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/exercicio_06
          if [ -f exercicio_06/train/train.py ]; then python exercicio_06/train/train.py; fi

      - name: Test with pytest
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/exercicio_06
          pytest exercicio_06/

      - name: Build Docker image
        run: docker build -t ex_06 ./exercicio_06
