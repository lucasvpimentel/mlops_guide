name: CI - Exercicio 02 (Eficiencia Energetica)

on:
  push:
    paths:
      - 'exercicio_02/**'
      - '.github/workflows/ex02_ci.yml'
  pull_request:
    paths:
      - 'exercicio_02/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: exercicio_02

    env:
      PYTHONPATH: ${{ github.workspace }}/exercicio_02

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 app/ train/ tests/

      - name: Train model
        run: python train/train.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t exercicio_02 .
