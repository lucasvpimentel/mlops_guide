name: CI - Exercicio 02
on:
  push:
    paths:
      - 'exercicio_02/**'
  pull_request:
    paths:
      - 'exercicio_02/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pandas scikit-learn joblib fastapi uvicorn ucimlrepo
          if [ -f exercicio_02/requirements.txt ]; then pip install -r exercicio_02/requirements.txt; fi

      - name: Lint with flake8
        run: flake8 exercicio_02/

      - name: Train model
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/exercicio_02
          python exercicio_02/train/train.py

      - name: Test with pytest
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/exercicio_02
          pytest exercicio_02/

      - name: Build Docker image
        run: docker build -t ex_02 ./exercicio_02
