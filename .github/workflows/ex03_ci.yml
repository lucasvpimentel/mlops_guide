name: CI - Exercicio 03
on:
  push:
    paths:
      - 'exercicio_03/**'
  pull_request:
    paths:
      - 'exercicio_03/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f exercicio_03/requirements.txt ]; then pip install -r exercicio_03/requirements.txt; fi

      - name: Lint with flake8
        run: flake8 exercicio_03/

      - name: Test with pytest
        run: pytest exercicio_03/

      - name: Build Docker image
        run: docker build -t ex_03 ./exercicio_03
